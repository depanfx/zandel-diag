server {
    listen 80;
    server_name apotekz.my.id www.apotekz.my.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name apotekz.my.id www.apotekz.my.id;

    # SSL — managed by Certbot
    ssl_certificate /etc/letsencrypt/live/apotekz.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apotekz.my.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/zandel-diag/frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Serve frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to Node.js backend
    location /api/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
